<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Stars Test</title>
    <style>
        #shootingStarsOverlay {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100svh;
            overflow: hidden;
            pointer-events: none;
            z-index: 9999;
            background: black;
        }
        .star {
            position: absolute;
            width: var(--size);
            height: var(--size);
            background: white;
            border-radius: 50%;
            opacity: var(--opacity);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
            animation: twinkle var(--twinkle-speed) ease-in-out infinite;
            animation-delay: var(--delay);
        }
        .shooting-star {
            position: absolute;
            width: clamp(70px, 22vw, 150px);
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(-90deg, white, rgba(255, 255, 255, 0.75), transparent);
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.95);
            transform: rotate(-35deg);
            animation: shoot linear forwards;
        }
        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.35; }
            50% { transform: scale(1.8); opacity: 1; }
        }
        @keyframes shoot {
            0% { transform: translate3d(0, 0, 0) rotate(-35deg); opacity: 0; }
            8% { opacity: 1; }
            100% { transform: translate3d(-125vw, 62vh, 0) rotate(-35deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="shootingStarsOverlay"></div>
    
    <script>
        const overlay = document.getElementById("shootingStarsOverlay");
        const starCount = 80;
        const meteorInterval = 800;
        
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement("span");
            star.className = "star";
            const size = Math.random() * 2.2 + 1;
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "svh";
            star.style.setProperty("--size", size + "px");
            star.style.setProperty("--opacity", Math.random() * 0.75 + 0.25);
            star.style.setProperty("--delay", Math.random() * 5 + "s");
            star.style.setProperty("--twinkle-speed", Math.random() * 3 + 2 + "s");
            overlay.appendChild(star);
        }
        
        function createMeteor() {
            const meteor = document.createElement("span");
            meteor.className = "shooting-star";
            meteor.style.top = Math.random() * 58 + "svh";
            meteor.style.left = Math.random() * 50 + 75 + "vw";
            meteor.style.animationDuration = Math.random() * 1.6 + 1.6 + "s";
            overlay.appendChild(meteor);
            setTimeout(() => { meteor.remove(); }, 3500);
        }
        
        createMeteor();
        setInterval(createMeteor, meteorInterval);
    </script>
</body>
</html>
